<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Blue Platform</title>
    <style>
        /* Reset and basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #87CEEB, #9B59B6); /* Sky blue to purple */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Stars animation */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            background-image: radial-gradient(white, transparent);
            background-repeat: repeat;
            background-size: 2px 2px;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        /* Get Started Button */
        .btn {
            background-color: #fff;
            color: #333;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            animation: pulse 2s infinite;
            transition: all 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 255, 255, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 255, 255, 1); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 255, 255, 0.7); }
        }

        /* Form hidden initially */
        .form-container {
            display: none;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .form-container input {
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-container button {
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #9B59B6;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .form-container button:hover {
            background-color: #8e44ad;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="content">
        <button class="btn" id="startBtn">Get Started</button>
        <div class="form-container" id="formContainer">
            <h2>Create Account</h2>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const formContainer = document.getElementById('formContainer');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            formContainer.style.display = 'flex';
        });
    </script>
</body>
</html>
